name: NuGet Package CI/CD

on:
  push:
    branches: [ master ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '11.0.x'
  DOTNET_QUALITY: 'preview'
  CONFIGURATION: Release

jobs:
  pack:
    name: Pack Packages
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        dotnet-quality: ${{ env.DOTNET_QUALITY }}

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android workload
      run: dotnet workload install android

    - name: Restore
      run: dotnet restore CheapBarcodes.Scanning/CheapBarcodes.Scanning.csproj

    - name: Pack
      run: |
        dotnet pack CheapBarcodes.Binding/CheapBarcodes.Binding.csproj --configuration ${{ env.CONFIGURATION }} --output ./nupkgs
        dotnet pack CheapBarcodes.Scanning/CheapBarcodes.Scanning.csproj --configuration ${{ env.CONFIGURATION }} --output ./nupkgs

    - name: Upload NuGet packages
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ./nupkgs/*.nupkg
        retention-days: 90

  publish:
    name: Publish to NuGet.org
    needs: pack
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download NuGet packages
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: ./nupkgs

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        dotnet-quality: ${{ env.DOTNET_QUALITY }}

    - name: List packages
      run: ls -la ./nupkgs/

    - name: Publish packages to NuGet.org
      run: |
        for pkg in ./nupkgs/*.nupkg; do
          echo "Publishing $pkg"
          dotnet nuget push "$pkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        done
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
